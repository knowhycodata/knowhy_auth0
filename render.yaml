services:
  - type: web
    name: knowhy-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: knowhy-postgres
          property: connectionString
      - key: CLIENT_URL
        sync: false
      - key: CLIENT_URLS
        sync: false
      - key: ENABLE_FILE_LOGS
        value: "false"
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: AUTH0_CALLBACK_URL
        sync: false
      - key: AUTH0_GMAIL_CALLBACK_URL
        sync: false
      - key: AUTH0_LOGOUT_URL
        sync: false
      - key: AUTH0_CUSTOM_API_CLIENT_ID
        sync: false
      - key: AUTH0_CUSTOM_API_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: WORKER_MODEL
        value: anthropic/claude-opus-4.6
      - key: GUARDRAIL_MODEL
        value: google/gemini-3.1-pro-preview-customtools
      - key: ENABLE_RESPONSE_GUARDRAIL
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: STEP_UP_ALLOWED_AUDIENCES
        sync: false
      - key: STEP_UP_WINDOW_SECONDS
        value: "300"
      - key: STEP_UP_REQUIRE_MFA_CLAIM
        value: "true"

  - type: web
    name: knowhy-frontend
    runtime: static
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: knowhy-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_AUTH0_DOMAIN
        sync: false
      - key: VITE_AUTH0_CLIENT_ID
        sync: false
      - key: VITE_AUTH0_AUDIENCE
        sync: false

databases:
  - name: knowhy-postgres
    databaseName: knowhy_db
    user: knowhy_user
    plan: free
