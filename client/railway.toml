# Railway Frontend Configuration (Static Site)
# https://docs.railway.app/reference/config-as-code

[build]
builder = "nixpacks"
buildCommand = "npm ci && npm run build"

[deploy]
# Docker runtime static server ile process.env.PORT uzerinden acilir
startCommand = "node static-server.cjs"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
